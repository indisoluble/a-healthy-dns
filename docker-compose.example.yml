version: '3.8'

services:
  a-healthy-dns:
    build: .
    ports:
      # Publish standard DNS on the host while the process listens on a non-privileged container port.
      # If you change the command to "--port 53", see docs/docker.md for the required sysctl/capability guidance.
      - "53:53053/udp"
    command:
      # Required parameters
      - --hosted-zone
      - "example.com"
      - --zone-resolutions
      - '{"www":["192.168.1.200"],"api":{"ips":["192.168.1.102"],"health_port":8000}}'
      - --ns
      - '["ns1.dns.example.net", "ns2.dns.example.net"]'

      # Optional parameters
      - --port
      - "53053"
      # - --log-level
      # - info
      # - --alias-zones
      # - '[]'
      # - --test-min-interval
      # - "30"
      # - --test-timeout
      # - "2"

      # Optional DNSSEC parameters
      # - --priv-key-path
      # - /app/keys/private.pem
      # - --priv-key-alg
      # - RSASHA256
    
    # volumes:
      # Mount a directory for DNSSEC keys (optional)
      # - "./keys:/app/keys:ro"
      
    # Network configuration
    networks:
      - dns-network
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Security: the app binds a non-privileged container port, so no port-binding capability is required.
    cap_drop:
      - ALL
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M      # Adjust based on zone size and query volume
          cpus: '0.5'       # Adjust based on DNSSEC usage and load
        reservations:
          memory: 128M
          cpus: '0.25'
    
    # Restart policy
    restart: unless-stopped

networks:
  dns-network:
    driver: bridge

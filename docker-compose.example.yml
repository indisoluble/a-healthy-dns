version: '3.8'

services:
  a-healthy-dns:
    build: .
    ports:
      # Map container port to host port (host:container)
      - "53:53/udp"
    command:
      # Required parameters
      - --hosted-zone
      - "example.com"
      - --zone-resolutions
      - '{"www":{"ips":["192.168.1.100","192.168.1.101"],"health_port":8080},"api":{"ips":["192.168.1.102"],"health_port":8000}}'
      - --ns
      - '["ns1.dns.example.net", "ns2.dns.example.net"]'

      # Optional parameters
      - --port
      - "53"
      # - --log-level
      # - info
      # - --alias-zones
      # - '[]'
      # - --test-min-interval
      # - "30"
      # - --test-timeout
      # - "2"

      # Optional DNSSEC parameters
      # - --priv-key-path
      # - /app/keys/private.pem
      # - --priv-key-alg
      # - RSASHA256
    
    # volumes:
      # Mount a directory for DNSSEC keys (optional)
      # - "./keys:/app/keys:ro"
      
    # Network configuration
    networks:
      - dns-network
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Security: Drop all capabilities and add only required ones
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Security: Specify user explicitly
    user: "10000:10000"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M      # Adjust based on zone size and query volume
          cpus: '0.5'       # Adjust based on DNSSEC usage and load
        reservations:
          memory: 128M
          cpus: '0.25'
    
    # Restart policy
    restart: unless-stopped

networks:
  dns-network:
    driver: bridge
